name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+a[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+b[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

env:
  PACKAGE_NAME: "pydi-framework"

jobs:
  details:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.release.outputs.new_version }}
      suffix: ${{ steps.release.outputs.suffix }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Check that tag is on main branch
        run: |
          git fetch origin main:main
          if git merge-base --is-ancestor "${GITHUB_SHA}" main; then
            echo "Tag commit is on main branch, continuing release."
          else
            echo "Tag commit is not on main branch. Exiting."
            exit 1
          fi

      - name: Extract tag and Details
        id: release
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}

            NEW_VERSION=$(echo "$TAG_NAME" | grep -oP '^\d+\.\d+\.\d+')
            SUFFIX=$(echo "$TAG_NAME" | grep -oP '(a|b|rc)\d+$' || echo "")

            if [ -z "$NEW_VERSION" ]; then
              echo "Could not parse version from tag: $TAG_NAME"
              exit 1
            fi

            echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "suffix=$SUFFIX"           >> "$GITHUB_OUTPUT"
            echo "tag_name=$TAG_NAME"       >> "$GITHUB_OUTPUT"

            echo "Version is $NEW_VERSION"
            echo "Suffix is $SUFFIX"
            echo "Tag name is $TAG_NAME"
          else
            echo "No tag found"
            exit 1
          fi

  check_pypi:
    needs: details
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python for version comparison
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install packaging for PEP 440-aware comparison
        run: pip install packaging

      - name: Fetch information from PyPI
        run: |
          response=$(curl -s https://pypi.org/pypi/${{ env.PACKAGE_NAME }}/json || echo "{}")

          latest_previous_version=$(echo "$response" | jq --raw-output \
            'if .info.version then .info.version else "0.0.0" end')

          if [ -z "$latest_previous_version" ] || [ "$latest_previous_version" = "null" ]; then
            echo "Package not found on PyPI — treating previous version as 0.0.0"
            latest_previous_version="0.0.0"
          fi

          echo "Latest version on PyPI: $latest_previous_version"
          echo "latest_previous_version=$latest_previous_version" >> "$GITHUB_ENV"

      - name: Compare versions and exit if not newer
        run: |
          NEW_VERSION="${{ needs.details.outputs.new_version }}${{ needs.details.outputs.suffix }}"
          LATEST_VERSION="$latest_previous_version"

          python3 - <<EOF
          from packaging.version import Version
          new     = Version("$NEW_VERSION")
          latest  = Version("$LATEST_VERSION")
          if new <= latest:
              print(f"::error::New version {new} is not greater than latest PyPI version {latest}")
              raise SystemExit(1)
          print(f"New version {new} is greater than latest PyPI version {latest} — proceeding")
          EOF

  setup_and_build:
    needs: [details, check_pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Build source and wheel distribution
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi_publish:
    name: Upload release to PyPI
    needs: [setup_and_build, details, check_pypi]
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github_release:
    name: Create GitHub Release
    needs: [setup_and_build, details, check_pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ needs.details.outputs.tag_name }} dist/* --title ${{ needs.details.outputs.tag_name }} --generate-notes
